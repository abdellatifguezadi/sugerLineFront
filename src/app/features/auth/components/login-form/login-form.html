<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div class="space-y-2">
              <label for="username" class="block text-sm font-bold text-[#3c1e08] dark:text-slate-300">
                Username
              </label>
              <div class="relative">
                <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                <input
                  id="username"
                  type="text"
                  [formControl]="usernameControl"
                  placeholder="chef_admin"
                  class="w-full py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white text-black focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none pl-12 pr-4"
                />
              </div>
              @if (getError('username')) {
                <p class="text-red-600 text-xs mt-1 font-semibold">{{ getError('username') }}</p>
              }
            </div>
            
            <div class="space-y-2">
              <label for="password" class="block text-sm font-bold text-[#3c1e08] dark:text-slate-300">
                Password
              </label>
              <div class="relative">
                <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                <input
                  id="password"
                  type="password"
                  [formControl]="passwordControl"
                  placeholder="••••••••"
                  class="w-full py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white text-black focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none pl-12 pr-4"
                />
              </div>
              @if (getError('motDePasse')) {
                <p class="text-red-600 text-xs mt-1 font-semibold">{{ getError('motDePasse') }}</p>
              }
            </div>
            
            <button
              type="submit"
              [disabled]="loginForm.invalid || loading"
              class="w-full bg-[#c03f0c] hover:bg-[#a8360a] text-white font-bold py-4 rounded-lg shadow-lg shadow-[#c03f0c]/20 transition-all flex items-center justify-center gap-2 group disabled:opacity-50 disabled:cursor-not-allowed"
            >
              @if (loading) {
                <app-loading size="sm" [light]="true"></app-loading>
                <span>Connexion...</span>
              } @else {
                <span>Sign In to Dashboard</span>
                <span class="material-icons text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
              }
            </button>
  
</form>
