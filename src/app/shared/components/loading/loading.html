<div
  class="app-loading"
  [class.app-loading--overlay]="overlay"
  [class.app-loading--light]="light"
  [class.app-loading--sm]="size === 'sm'"
  [class.app-loading--md]="size === 'md'"
  [class.app-loading--lg]="size === 'lg'">
  <span class="material-icons app-loading__icon">sync</span>
</div>
