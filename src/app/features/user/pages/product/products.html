<div class="min-h-screen bg-[#fdfaf7] text-[#3c1e08]">
  <div class="flex min-h-screen">
    <app-sidebar [role]="connectedRole$ | async" [isLoading]="(authLoading$ | async) ?? true"></app-sidebar>

    <div class="flex flex-1 flex-col overflow-hidden">

      <app-navbar title="Gestion des Produits"></app-navbar>

      <main class="flex-1 overflow-y-auto p-4 md:p-6">

        <div class="mb-6">
          <app-filter-bar
            [fields]="filterFields"
            [(filters)]="filters"
            (apply)="applyFilters()"
            (clear)="clearFilters()">
          </app-filter-bar>

        </div>

        <div class="mb-6 flex items-center justify-between">
          <p class="text-sm text-slate-600">{{ totalElements }} produit(s) trouvé(s)</p>
          <button
            (click)="openCreateModal()"
            class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90">
            + Nouveau Produit
          </button>
        </div>

        <!-- Messages d'erreur -->
        @if (error) {
          <div class="mb-4 rounded-lg border border-red-200 bg-red-50 p-4">
            <p class="text-sm font-medium text-red-800">{{ error }}</p>
          </div>
        }

        <!-- Table des produits -->
        <app-table
          [columns]="tableColumns"
          [data]="displayProducts"
          [actions]="tableActions"
          [loading]="loading"
          emptyMessage="Aucun produit trouvé. Essayez de modifier les filtres.">
        </app-table>

        <app-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination>

      </main>
    </div>
  </div>
</div>

@if (showModal) {
  <app-product-form
    [product]="selectedProduct"
    [isEditMode]="isEditMode"
    (submitForm)="onSubmit($event)"
    (cancel)="closeModal()">
  </app-product-form>
}

@if (showViewModal) {
  <app-product-view
    [product]="selectedViewProduct"
    (close)="closeViewModal()">
  </app-product-view>
}
