<div class="flex min-h-screen items-center justify-center bg-background-light p-6 text-espresso">
  <div class="w-full max-w-lg rounded-2xl border border-espresso/10 bg-white p-8 text-center shadow-sm">
    <p class="text-sm font-bold uppercase tracking-widest text-primary">404</p>
    <h1 class="mt-2 text-3xl font-black">Page introuvable</h1>
    <p class="mt-3 text-sm text-espresso/70">
      La page demandee n'existe pas ou a ete deplacee.
    </p>

    <div class="mt-6 flex justify-center gap-3">
      <a
        routerLink="/"
        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-50">
        Home
      </a>
      @if (isAuthenticated) {
        <a
          [routerLink]="dashboardLink"
          class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90">
          Dashboard
        </a>
      } @else {
        <a
          routerLink="/login"
          class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90">
          Login
        </a>
      }
    </div>
  </div>
</div>
