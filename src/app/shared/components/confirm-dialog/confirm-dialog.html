<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
    <h2 class="text-xl font-bold text-[#3c1e08]">{{ title }}</h2>
    <p class="mt-3 text-sm text-slate-600">{{ message }}</p>

    <div class="mt-6 flex gap-3">
      <button
        type="button"
        (click)="onCancel()"
        class="flex-1 rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-50">
        {{ cancelLabel }}
      </button>
      <button
        type="button"
        (click)="onConfirm()"
        [class]="variant === 'danger'
          ? 'flex-1 rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-red-700'
          : 'flex-1 rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90'">
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
