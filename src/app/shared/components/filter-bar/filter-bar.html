<div class="rounded-2xl border border-primary/10 bg-white p-5 shadow-sm">
  <h3 class="mb-4 text-sm font-bold text-[#3c1e08]">Filtres</h3>
  
  <div class="grid grid-cols-1 gap-4 md:grid-cols-4">
    @for (field of fields; track field.key) {
      <div>
        <label class="block text-xs font-semibold text-slate-700">{{ field.label }}</label>
        
        @if (field.type === 'text') {
          <input 
            type="text" 
            [(ngModel)]="filters[field.key]" 
            (ngModelChange)="onFilterChange()"
            (keyup.enter)="onKeyEnter()"
            [placeholder]="field.placeholder || ''"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
        }
        
        @if (field.type === 'number') {
          <input 
            type="number" 
            [(ngModel)]="filters[field.key]" 
            (ngModelChange)="onFilterChange()"
            (keyup.enter)="onKeyEnter()"
            [placeholder]="field.placeholder || '0.00'"
            [attr.min]="field.min"
            [attr.max]="field.max"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
        }
        
        @if (field.type === 'date') {
          <input 
            type="date" 
            [(ngModel)]="filters[field.key]" 
            (ngModelChange)="onFilterChange()"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
        }
        
        @if (field.type === 'select' && field.options) {
          <select 
            [(ngModel)]="filters[field.key]" 
            (ngModelChange)="onFilterChange()"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
            <option [value]="undefined">Tous</option>
            @for (option of field.options; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        }
      </div>
    }
    
    <div class="flex flex-col gap-2 sm:flex-row sm:items-end">
      <button 
        (click)="onApply()"
        class="w-full flex-1 rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90 sm:w-auto">
        Filtrer
      </button>
      <button 
        (click)="onClear()"
        class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-50 sm:w-auto">
        Réinitialiser
      </button>
    </div>
  </div>
</div>
