<div class="min-h-screen bg-[#fdfaf7] text-[#3c1e08]">
  <div class="flex min-h-screen">
    <app-sidebar [role]="connectedRole$ | async" [isLoading]="(authLoading$ | async) ?? true"></app-sidebar>

    <div class="flex flex-1 flex-col overflow-hidden">

      <app-navbar title="Charges mensuelles"></app-navbar>

      <main class="flex-1 overflow-y-auto p-4 md:p-6">

        <div class="mb-6 flex items-center justify-between">
          <p class="text-sm text-slate-600">{{ totalElements }} charge(s) trouvée(s)</p>
          <button (click)="openCreateModal()"
            class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90">
            + Nouvelles charges
          </button>
        </div>

        <app-table
          [columns]="tableColumns"
          [data]="displayData"
          [actions]="tableActions"
          [loading]="loading"
          emptyMessage="Aucune charge trouvée. Ajoutez des charges mensuelles.">
        </app-table>

        <app-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination>

      </main>
    </div>
  </div>
</div>

@if (showModal) {
  <app-charges-form
    [charges]="selectedCharges"
    [isEditMode]="isEditMode"
    (success)="onSuccess()"
    (error)="onFormError($event)"
    (cancel)="closeModal()">
  </app-charges-form>
}

@if (showDeleteConfirm) {
  <app-confirm-dialog
    title="Supprimer les charges"
    message="Êtes-vous sûr de vouloir supprimer ces charges ?"
    confirmLabel="Supprimer"
    cancelLabel="Annuler"
    variant="danger"
    (confirm)="confirmDelete()"
    (cancel)="closeDeleteConfirm()">
  </app-confirm-dialog>
}
