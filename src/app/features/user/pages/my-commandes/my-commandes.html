<div class="min-h-screen bg-[#fdfaf7] text-[#3c1e08]">
  <div class="flex min-h-screen">
    <app-sidebar [role]="connectedRole$ | async" [isLoading]="(authLoading$ | async) ?? true"></app-sidebar>

    <div class="flex flex-1 flex-col overflow-hidden">

      <app-navbar title="Mes commandes"></app-navbar>

      <main class="flex-1 overflow-y-auto p-4 md:p-6">

        <div class="mb-6">
          <app-filter-bar
            [fields]="filterFields"
            [(filters)]="filters"
            (apply)="applyFilters()"
            (clear)="clearFilters()">
          </app-filter-bar>
        </div>

        <div class="mb-6 flex items-center justify-between">
          <p class="text-sm text-slate-600">{{ totalElements }} commande(s) trouvée(s)</p>
          <button
            (click)="openCreateModal()"
            class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90">
            + Nouvelle commande
          </button>
        </div>

        @if (error) {
          <div class="mb-4 rounded-lg border border-red-200 bg-red-50 p-4">
            <p class="text-sm font-medium text-red-800">{{ error }}</p>
          </div>
        }

        <app-table
          [columns]="tableColumns"
          [data]="displayCommandes"
          [actions]="tableActions"
          [loading]="loading"
          emptyMessage="Aucune commande trouvée. Essayez de modifier les filtres.">
        </app-table>

        <app-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination>

      </main>
    </div>
  </div>
</div>

@if (showDetailModal) {
  <app-commande-detail
    [commande]="selectedCommande"
    (close)="closeDetailModal()">
  </app-commande-detail>
}

@if (showFormModal) {
  <app-commande-form
    [commande]="selectedCommande"
    [isEditMode]="isEditMode"
    (saved)="onFormSaved()"
    (error)="onFormError($event)"
    (cancel)="closeFormModal()">
  </app-commande-form>
}

@if (showDeleteConfirm) {
  <app-confirm-dialog
    title="Supprimer la commande"
    message="Êtes-vous sûr de vouloir supprimer (annuler) cette commande ?"
    confirmLabel="Supprimer"
    cancelLabel="Annuler"
    variant="danger"
    (confirm)="confirmDelete()"
    (cancel)="closeDeleteConfirm()">
  </app-confirm-dialog>
}

@if (showPaiementConfirm && commandeToPay) {
  <app-paiement-confirm
    [visible]="true"
    [commandeId]="commandeToPay.id"
    [montant]="commandeToPay.total"
    (saved)="onPaiementSaved()"
    (error)="onPaiementError($event)"
    (cancelled)="closePaiementConfirm()">
  </app-paiement-confirm>
}
