<div class="min-h-screen bg-[#fdfaf7] text-[#3c1e08]">
  <div class="flex min-h-screen">
    <app-sidebar [role]="connectedRole$ | async" [isLoading]="(authLoading$ | async) ?? true"></app-sidebar>

    <div class="flex flex-1 flex-col overflow-hidden">
      <app-navbar title="Mes paiements"></app-navbar>

      <main class="flex-1 overflow-y-auto p-4 md:p-6">
        <div class="mb-6">
          <app-filter-bar
            [fields]="filterFields"
            [(filters)]="filters"
            (apply)="applyFilters()"
            (clear)="clearFilters()">
          </app-filter-bar>
        </div>

        <p class="mb-4 text-sm text-slate-600">{{ totalElements }} paiement(s) trouvé(s)</p>

        <app-paiement-table
          [data]="paiements"
          [loading]="loading"
          emptyMessage="Aucun paiement trouvé. Essayez de modifier les filtres.">
        </app-paiement-table>

        <app-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination>
      </main>
    </div>
  </div>
</div>
