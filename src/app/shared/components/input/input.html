<div class="space-y-2">
  <label [for]="id" class="block text-sm font-bold text-[#3c1e08] dark:text-slate-300">
    {{ label }}
  </label>
  <div class="relative">
    @if (icon) {
      <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">{{ icon }}</span>
    }
    <input
      [type]="showPassword && type === 'password' ? 'text' : type"
      [id]="id"
      [formControl]="control"
      [placeholder]="placeholder"
      class="w-full py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white text-black focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none pl-12 pr-4"
    />
    @if (type === 'password') {
      <button 
        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary" 
        type="button"
        (click)="togglePasswordVisibility()"
      >
        <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
      </button>
    }
  </div>
  @if (control.invalid && (control.touched || control.dirty)) {
    <p class="text-red-600 text-xs mt-1 font-semibold">{{ errorMessage }}</p>
  }
</div>
