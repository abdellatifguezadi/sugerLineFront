<div class="min-h-screen bg-[#fdfaf7] text-[#3c1e08]">
  <div class="flex min-h-screen">
    <app-sidebar [role]="connectedRole$ | async" [isLoading]="(authLoading$ | async) ?? true"></app-sidebar>

    <div class="flex flex-1 flex-col overflow-hidden">

      <app-navbar title="Gestion des Ingrédients"></app-navbar>

      <main class="flex-1 overflow-y-auto p-4 md:p-6">

        <div class="mb-6 flex items-center justify-between">
          <p class="text-sm text-slate-600">Gérez tous vos ingrédients en un seul endroit</p>
          <button (click)="openCreateModal()"
            class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-primary/90">
            + Nouvel Ingrédient
          </button>
        </div>

        <app-table
          [columns]="tableColumns"
          [data]="(ingredients$ | async) || []"
          [actions]="tableActions"
          [loading]="(loading$ | async) || false"
          emptyMessage="Aucun ingrédient trouvé. Commencez par ajouter un nouvel ingrédient.">
        </app-table>

      </main>
    </div>
  </div>
</div>

@if (showModal) {
  <app-ingredient-form
    [ingredient]="selectedIngredient"
    [isEditMode]="isEditMode"
    (submitForm)="onSubmit($event)"
    (cancel)="closeModal()">
  </app-ingredient-form>
}

@if (showDeleteConfirm) {
  <app-confirm-dialog
    title="Supprimer l'ingrédient"
    message="Êtes-vous sûr de vouloir supprimer cet ingrédient ?"
    confirmLabel="Supprimer"
    cancelLabel="Annuler"
    variant="danger"
    (confirm)="confirmDelete()"
    (cancel)="closeDeleteConfirm()">
  </app-confirm-dialog>
}
