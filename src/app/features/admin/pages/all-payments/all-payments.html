<div class="min-h-screen bg-[#fdfaf7] text-[#3c1e08]">
  <div class="flex min-h-screen">
    <app-sidebar [role]="connectedRole$ | async" [isLoading]="(authLoading$ | async) ?? true"></app-sidebar>

    <div class="flex flex-1 flex-col overflow-hidden">
      <app-navbar title="Tous les paiements"></app-navbar>

      <main class="flex-1 overflow-y-auto p-4 md:p-6">
        <div class="mb-6">
          <app-filter-bar
            [fields]="filterFields"
            [(filters)]="filters"
            (apply)="applyFilters()"
            (clear)="clearFilters()">
          </app-filter-bar>
        </div>

        <p class="mb-4 text-sm text-slate-600">{{ totalElements }} paiement(s) trouvé(s)</p>

        @if (error) {
          <div class="mb-4 rounded-lg border border-red-200 bg-red-50 p-4">
            <p class="text-sm font-medium text-red-800">{{ error }}</p>
          </div>
        }

        <app-paiement-table
          [data]="paiements"
          [loading]="loading"
          [actions]="tableActions"
          [showClient]="true"
          emptyMessage="Aucun paiement trouvé. Essayez de modifier les filtres.">
        </app-paiement-table>

        <app-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination>
      </main>
    </div>
  </div>
</div>

@if (showAccepterConfirm) {
  <app-confirm-dialog
    title="Accepter le paiement"
    message="Confirmer l'acceptation de ce paiement ?"
    confirmLabel="Accepter"
    cancelLabel="Retour"
    variant="primary"
    (confirm)="confirmAccepter()"
    (cancel)="closeAccepterConfirm()">
  </app-confirm-dialog>
}

@if (showAnnulerConfirm) {
  <app-confirm-dialog
    title="Annuler le paiement"
    message="Êtes-vous sûr de vouloir annuler ce paiement ?"
    confirmLabel="Annuler"
    cancelLabel="Retour"
    variant="danger"
    (confirm)="confirmAnnuler()"
    (cancel)="closeAnnulerConfirm()">
  </app-confirm-dialog>
}
