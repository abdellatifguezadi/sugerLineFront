@if (show) {
  <div class="mt-6 flex items-center justify-between rounded-2xl border border-primary/10 bg-white p-4 shadow-sm">
    <button
      (click)="previous()"
      [disabled]="currentPage === 0"
      class="rounded-lg border border-primary/20 px-4 py-2 text-sm font-semibold text-primary transition-colors hover:bg-primary/10 disabled:cursor-not-allowed disabled:opacity-50">
      Précédent
    </button>

    <div class="mx-3 flex-1 overflow-x-auto">
      <div class="flex min-w-max items-center justify-center gap-2">
        @for (page of pages; track page) {
          <button
            (click)="goTo(page)"
            [class.bg-primary]="currentPage === page"
            [class.text-white]="currentPage === page"
            [class.border-primary]="currentPage === page"
            [class.text-primary]="currentPage !== page"
            [class.border-primary/20]="currentPage !== page"
            class="rounded-lg border px-3 py-1 text-sm font-semibold transition-colors hover:bg-primary/10">
            {{ page + 1 }}
          </button>
        }
      </div>
    </div>

    <button
      (click)="next()"
      [disabled]="currentPage === totalPages - 1"
      class="rounded-lg border border-primary/20 px-4 py-2 text-sm font-semibold text-primary transition-colors hover:bg-primary/10 disabled:cursor-not-allowed disabled:opacity-50">
      Suivant
    </button>
  </div>
}
